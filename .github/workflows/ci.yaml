name: Release CLI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Test, build, package, and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@kodehode"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm i

      - name: Run unit tests
        run: npm run test

      - name: Run BDD tests
        run: npm run bdd

      - name: Build CLI executables
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
        run: |
          npm run build -w @kodehode/oppgavehjelper

          if [ -z "$SERVER_HOST" ]; then
            DEFINE_SERVER_HOST="undefined"
          else
            DEFINE_SERVER_HOST="\"$SERVER_HOST\""
          fi

          bun build packages/cli/dist/index.js \
            --compile \
            --target=bun-linux-x64 \
            --define SERVER_HOST="$DEFINE_SERVER_HOST" \
            --outfile dist/oppgavehjelper

          bun build packages/cli/dist/index.js \
            --compile \
            --target=bun-win-x64 \
            --define SERVER_HOST="$DEFINE_SERVER_HOST" \
            --outfile dist/oppgavehjelper-winx64

          bun build packages/cli/dist/index.js \
            --compile \
            --target=bun-macos-arm64 \
            --define SERVER_HOST="$DEFINE_SERVER_HOST" \
            --outfile dist/oppgavehjelper-macarm64

      - name: Make Unix binaries executable
        run: |
          chmod +x dist/oppgavehjelper
          chmod +x dist/oppgavehjelper-macarm64
          chmod +x dist/oppgavehjelper-macx64

      - name: Prepare npm package for GitHub Packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          mkdir -p package/bin

          cp packages/cli/dist/index.js package/bin/oppgavehjelper.js

          cat > package/package.json <<EOF
          {
            "name": "@kodehode/oppgavehjelper",
            "version": "$VERSION",
            "description": "Compiled JavaScript CLI for Oppgavehjelper",
            "type": "module",
            "bin": {
              "oppgavehjelper": "./bin/oppgavehjelper.js"
            },
            "files": [
              "bin"
            ],
            "publishConfig": {
              "registry": "https://npm.pkg.github.com"
            },
            "repository": {
              "type": "git",
              "url": "git+https://github.com/${GITHUB_REPOSITORY}.git"
            }
          }
          EOF

          sed -i '1s|^|#!/usr/bin/env node\n|' package/bin/oppgavehjelper.js
          chmod +x package/bin/oppgavehjelper.js

      - name: Publish package to GitHub Packages
        working-directory: package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/oppgavehjelper
            dist/oppgavehjelper-winx64.exe
            dist/oppgavehjelper-winarm64.exe
            dist/oppgavehjelper-macarm64
            dist/oppgavehjelper-macx64